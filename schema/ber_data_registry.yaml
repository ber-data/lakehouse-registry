name: ber_data_registry
description: A LinkML schema for cataloging databases and data sources across scientific
  lakehouses at LBNL, including KBASE (Spark-based) and Dremio environments. Informed
  by the HPDF Data Catalog & Lakehouse Demo report (Cohoon & Paine, LBNL-2001745,
  Dec 2025), DCAT v3, and DCAT-US.
title: BER Data Registry
id: https://w3id.org/ber-data/ber-data-registry
version: 0.1.0
imports:
- linkml:types
license: MIT
prefixes:
  ber_registry:
    prefix_prefix: ber_registry
    prefix_reference: https://w3id.org/ber-data/ber-data-registry/
  linkml:
    prefix_prefix: linkml
    prefix_reference: https://w3id.org/linkml/
  schema:
    prefix_prefix: schema
    prefix_reference: http://schema.org/
  dcterms:
    prefix_prefix: dcterms
    prefix_reference: http://purl.org/dc/terms/
  dcat:
    prefix_prefix: dcat
    prefix_reference: http://www.w3.org/ns/dcat#
  vcard:
    prefix_prefix: vcard
    prefix_reference: http://www.w3.org/2006/vcard/ns#
  prov:
    prefix_prefix: prov
    prefix_reference: http://www.w3.org/ns/prov#
  pav:
    prefix_prefix: pav
    prefix_reference: http://purl.org/pav/
default_prefix: ber_registry
default_range: string
types:
  string:
    name: string
    definition_uri: https://w3id.org/linkml/String
    description: A character string
    notes:
    - In RDF serializations, a slot with range of string is treated as a literal or
      type xsd:string.   If you are authoring schemas in LinkML YAML, the type is
      referenced with the lower case "string".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Text
    base: str
    uri: xsd:string
  integer:
    name: integer
    definition_uri: https://w3id.org/linkml/Integer
    description: An integer
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "integer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Integer
    base: int
    uri: xsd:integer
  boolean:
    name: boolean
    definition_uri: https://w3id.org/linkml/Boolean
    description: A binary (true or false) value
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "boolean".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Boolean
    base: Bool
    uri: xsd:boolean
    repr: bool
  float:
    name: float
    definition_uri: https://w3id.org/linkml/Float
    description: A real number that conforms to the xsd:float specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "float".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Float
    base: float
    uri: xsd:float
  double:
    name: double
    definition_uri: https://w3id.org/linkml/Double
    description: A real number that conforms to the xsd:double specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "double".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:Float
    base: float
    uri: xsd:double
  decimal:
    name: decimal
    definition_uri: https://w3id.org/linkml/Decimal
    description: A real number with arbitrary precision that conforms to the xsd:decimal
      specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "decimal".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    broad_mappings:
    - schema:Number
    base: Decimal
    uri: xsd:decimal
  time:
    name: time
    definition_uri: https://w3id.org/linkml/Time
    description: A time object represents a (local) time of day, independent of any
      particular day
    notes:
    - URI is dateTime because OWL reasoners do not work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "time".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Time
    base: XSDTime
    uri: xsd:time
    repr: str
  date:
    name: date
    definition_uri: https://w3id.org/linkml/Date
    description: a date (year, month and day) in an idealized calendar
    notes:
    - URI is dateTime because OWL reasoners don't work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Date
    base: XSDDate
    uri: xsd:date
    repr: str
  datetime:
    name: datetime
    definition_uri: https://w3id.org/linkml/Datetime
    description: The combination of a date and time
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:DateTime
    base: XSDDateTime
    uri: xsd:dateTime
    repr: str
  date_or_datetime:
    name: date_or_datetime
    definition_uri: https://w3id.org/linkml/DateOrDatetime
    description: Either a date or a datetime
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date_or_datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: linkml:DateOrDatetime
    repr: str
  uriorcurie:
    name: uriorcurie
    definition_uri: https://w3id.org/linkml/Uriorcurie
    description: a URI or a CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uriorcurie".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: URIorCURIE
    uri: xsd:anyURI
    repr: str
  curie:
    name: curie
    definition_uri: https://w3id.org/linkml/Curie
    conforms_to: https://www.w3.org/TR/curie/
    description: a compact URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "curie".
    comments:
    - in RDF serializations this MUST be expanded to a URI
    - in non-RDF serializations MAY be serialized as the compact representation
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: Curie
    uri: xsd:string
    repr: str
  uri:
    name: uri
    definition_uri: https://w3id.org/linkml/Uri
    conforms_to: https://www.ietf.org/rfc/rfc3987.txt
    description: a complete URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uri".
    comments:
    - in RDF serializations a slot with range of uri is treated as a literal or type
      xsd:anyURI unless it is an identifier or a reference to an identifier, in which
      case it is translated directly to a node
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:URL
    base: URI
    uri: xsd:anyURI
    repr: str
  ncname:
    name: ncname
    definition_uri: https://w3id.org/linkml/Ncname
    description: Prefix part of CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "ncname".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NCName
    uri: xsd:string
    repr: str
  objectidentifier:
    name: objectidentifier
    definition_uri: https://w3id.org/linkml/Objectidentifier
    description: A URI or CURIE that represents an object in the model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "objectidentifier".
    comments:
    - Used for inheritance and type checking
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: ElementIdentifier
    uri: shex:iri
    repr: str
  nodeidentifier:
    name: nodeidentifier
    definition_uri: https://w3id.org/linkml/Nodeidentifier
    description: A URI, CURIE or BNODE that represents a node in a model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "nodeidentifier".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NodeIdentifier
    uri: shex:nonLiteral
    repr: str
  jsonpointer:
    name: jsonpointer
    definition_uri: https://w3id.org/linkml/Jsonpointer
    conforms_to: https://datatracker.ietf.org/doc/html/rfc6901
    description: A string encoding a JSON Pointer. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to a valid object within the current
      instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpointer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  jsonpath:
    name: jsonpath
    definition_uri: https://w3id.org/linkml/Jsonpath
    conforms_to: https://www.ietf.org/archive/id/draft-goessner-dispatch-jsonpath-00.html
    description: A string encoding a JSON Path. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to zero or more valid objects within
      the current instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  sparqlpath:
    name: sparqlpath
    definition_uri: https://w3id.org/linkml/Sparqlpath
    conforms_to: https://www.w3.org/TR/sparql11-query/#propertypaths
    description: A string encoding a SPARQL Property Path. The value of the string
      MUST conform to SPARQL syntax and SHOULD dereference to zero or more valid objects
      within the current instance document when encoded as RDF.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "sparqlpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
enums:
  DataSourceStatus:
    name: DataSourceStatus
    definition_uri: https://w3id.org/ber-data/ber-data-registry/DataSourceStatus
    description: Lifecycle status of a data source.
    from_schema: https://w3id.org/ber-data/ber-data-registry
    permissible_values:
      active:
        text: active
        description: Data source is actively maintained and available.
      deprecated:
        text: deprecated
        description: Data source is deprecated and should not be used for new work.
      archived:
        text: archived
        description: Data source is archived and read-only.
      experimental:
        text: experimental
        description: Data source is experimental or in development.
      test:
        text: test
        description: Data source is used for testing purposes only.
  AccessLevel:
    name: AccessLevel
    definition_uri: https://w3id.org/ber-data/ber-data-registry/AccessLevel
    description: Visibility and access restrictions for a data source.
    from_schema: https://w3id.org/ber-data/ber-data-registry
    permissible_values:
      public:
        text: public
        description: Accessible to anyone.
      restricted:
        text: restricted
        description: Access requires authorization or approval.
      internal:
        text: internal
        description: Only accessible within the organization.
  UpdateFrequency:
    name: UpdateFrequency
    definition_uri: https://w3id.org/ber-data/ber-data-registry/UpdateFrequency
    description: How often a data source is updated.
    from_schema: https://w3id.org/ber-data/ber-data-registry
    permissible_values:
      real_time:
        text: real_time
        description: Continuously updated in real time.
      daily:
        text: daily
        description: Updated once per day.
      weekly:
        text: weekly
        description: Updated once per week.
      monthly:
        text: monthly
        description: Updated once per month.
      quarterly:
        text: quarterly
        description: Updated once per quarter.
      annually:
        text: annually
        description: Updated once per year.
      irregular:
        text: irregular
        description: Updated at irregular intervals.
      static:
        text: static
        description: Not expected to be updated.
      unknown:
        text: unknown
        description: Update frequency is not known.
  DataSourceCategory:
    name: DataSourceCategory
    definition_uri: https://w3id.org/ber-data/ber-data-registry/DataSourceCategory
    description: Organizational category for a data source.
    from_schema: https://w3id.org/ber-data/ber-data-registry
    permissible_values:
      project:
        text: project
        description: Belongs to a specific research project.
      shared:
        text: shared
        description: Shared across multiple projects or teams.
      personal:
        text: personal
        description: Personal workspace of an individual user.
      system:
        text: system
        description: System-level or infrastructure data.
  PlatformType:
    name: PlatformType
    definition_uri: https://w3id.org/ber-data/ber-data-registry/PlatformType
    description: Technology platform for a lakehouse.
    from_schema: https://w3id.org/ber-data/ber-data-registry
    permissible_values:
      spark:
        text: spark
        description: Apache Spark-based lakehouse (e.g. KBASE).
      dremio:
        text: dremio
        description: Dremio data lakehouse platform.
      other:
        text: other
        description: Other platform type.
  SourceType:
    name: SourceType
    definition_uri: https://w3id.org/ber-data/ber-data-registry/SourceType
    description: Type of data source within a lakehouse, particularly relevant for
      Dremio environments.
    from_schema: https://w3id.org/ber-data/ber-data-registry
    permissible_values:
      namespace:
        text: namespace
        description: A namespace within a Spark-based lakehouse.
      object_storage:
        text: object_storage
        description: Object storage source (e.g. S3, MinIO).
      relational_database:
        text: relational_database
        description: Relational database source (PostgreSQL, MySQL).
      document_database:
        text: document_database
        description: Document database source (e.g. MongoDB).
      space:
        text: space
        description: A Dremio space for organizing views and virtual datasets.
  DatabaseEngine:
    name: DatabaseEngine
    definition_uri: https://w3id.org/ber-data/ber-data-registry/DatabaseEngine
    description: Specific database engine for database-type sources.
    from_schema: https://w3id.org/ber-data/ber-data-registry
    permissible_values:
      postgresql:
        text: postgresql
        description: PostgreSQL database.
      mysql:
        text: mysql
        description: MySQL database.
      mongodb:
        text: mongodb
        description: MongoDB document database.
      spark_sql:
        text: spark_sql
        description: Spark SQL engine.
      other:
        text: other
        description: Other database engine.
slots:
  id:
    name: id
    definition_uri: https://w3id.org/ber-data/ber-data-registry/id
    description: Unique identifier for this catalog entity.
    from_schema: https://w3id.org/ber-data/ber-data-registry
    mappings:
    - schema:identifier
    slot_uri: schema:identifier
    identifier: true
    owner: CatalogEntity
    domain_of:
    - DataRegistry
    - CatalogEntity
    range: uriorcurie
    required: true
  title:
    name: title
    definition_uri: https://w3id.org/ber-data/ber-data-registry/title
    description: Human-readable name for this entity.
    from_schema: https://w3id.org/ber-data/ber-data-registry
    mappings:
    - dcterms:title
    slot_uri: dcterms:title
    owner: CatalogEntity
    domain_of:
    - DataRegistry
    - CatalogEntity
    range: string
    required: true
  description:
    name: description
    definition_uri: https://w3id.org/ber-data/ber-data-registry/description
    description: Free-text description of this entity.
    from_schema: https://w3id.org/ber-data/ber-data-registry
    mappings:
    - dcterms:description
    slot_uri: dcterms:description
    owner: CatalogEntity
    domain_of:
    - DataRegistry
    - CatalogEntity
    range: string
  created_date:
    name: created_date
    definition_uri: https://w3id.org/ber-data/ber-data-registry/created_date
    description: Date this entity was first created or registered.
    from_schema: https://w3id.org/ber-data/ber-data-registry
    mappings:
    - dcterms:created
    slot_uri: dcterms:created
    owner: CatalogEntity
    domain_of:
    - CatalogEntity
    range: date
  last_modified:
    name: last_modified
    definition_uri: https://w3id.org/ber-data/ber-data-registry/last_modified
    description: Date this entity was last updated.
    from_schema: https://w3id.org/ber-data/ber-data-registry
    mappings:
    - dcterms:modified
    slot_uri: dcterms:modified
    owner: CatalogEntity
    domain_of:
    - CatalogEntity
    range: date
  endpoint_url:
    name: endpoint_url
    definition_uri: https://w3id.org/ber-data/ber-data-registry/endpoint_url
    description: URL endpoint for accessing the lakehouse.
    from_schema: https://w3id.org/ber-data/ber-data-registry
    mappings:
    - dcat:endpointURL
    slot_uri: dcat:endpointURL
    owner: Lakehouse
    domain_of:
    - Lakehouse
    range: uri
  operator:
    name: operator
    definition_uri: https://w3id.org/ber-data/ber-data-registry/operator
    description: Organization or team operating this lakehouse.
    from_schema: https://w3id.org/ber-data/ber-data-registry
    mappings:
    - dcterms:publisher
    slot_uri: dcterms:publisher
    owner: Lakehouse
    domain_of:
    - Lakehouse
    range: string
  platform_type:
    name: platform_type
    definition_uri: https://w3id.org/ber-data/ber-data-registry/platform_type
    description: The technology platform underlying this lakehouse.
    from_schema: https://w3id.org/ber-data/ber-data-registry
    slot_uri: ber_registry:platform_type
    owner: Lakehouse
    domain_of:
    - Lakehouse
    range: PlatformType
  owner:
    name: owner
    definition_uri: https://w3id.org/ber-data/ber-data-registry/owner
    description: Person or team responsible for this data source.
    from_schema: https://w3id.org/ber-data/ber-data-registry
    mappings:
    - dcterms:publisher
    slot_uri: dcterms:publisher
    owner: DataSource
    domain_of:
    - DataSource
    range: string
  contact_point:
    name: contact_point
    definition_uri: https://w3id.org/ber-data/ber-data-registry/contact_point
    description: Structured contact information for this data source.
    from_schema: https://w3id.org/ber-data/ber-data-registry
    mappings:
    - dcat:contactPoint
    slot_uri: dcat:contactPoint
    owner: DataSource
    domain_of:
    - DataSource
    range: ContactPoint
    inlined: true
    inlined_as_list: true
  lakehouse:
    name: lakehouse
    definition_uri: https://w3id.org/ber-data/ber-data-registry/lakehouse
    description: Reference to the hosting lakehouse for this data source.
    from_schema: https://w3id.org/ber-data/ber-data-registry
    slot_uri: ber_registry:lakehouse
    owner: DataSource
    domain_of:
    - DataSource
    range: Lakehouse
  namespace:
    name: namespace
    definition_uri: https://w3id.org/ber-data/ber-data-registry/namespace
    description: Database name, source name, or space name within the lakehouse (e.g.
      "kbase_public", "jgi_object_store").
    from_schema: https://w3id.org/ber-data/ber-data-registry
    slot_uri: ber_registry:namespace
    owner: DataSource
    domain_of:
    - DataSource
    range: string
  status:
    name: status
    definition_uri: https://w3id.org/ber-data/ber-data-registry/status
    description: Current lifecycle status of this data source.
    from_schema: https://w3id.org/ber-data/ber-data-registry
    mappings:
    - dcat:status
    slot_uri: dcat:status
    owner: DataSource
    domain_of:
    - DataSource
    range: DataSourceStatus
  is_deprecated:
    name: is_deprecated
    definition_uri: https://w3id.org/ber-data/ber-data-registry/is_deprecated
    description: Whether this data source is deprecated. Must always be explicitly
      set.
    from_schema: https://w3id.org/ber-data/ber-data-registry
    slot_uri: ber_registry:is_deprecated
    owner: DataSource
    domain_of:
    - DataSource
    range: boolean
  update_schedule:
    name: update_schedule
    definition_uri: https://w3id.org/ber-data/ber-data-registry/update_schedule
    description: How frequently this data source is updated.
    from_schema: https://w3id.org/ber-data/ber-data-registry
    mappings:
    - dcterms:accrualPeriodicity
    slot_uri: dcterms:accrualPeriodicity
    owner: DataSource
    domain_of:
    - DataSource
    range: UpdateFrequency
  access_level:
    name: access_level
    definition_uri: https://w3id.org/ber-data/ber-data-registry/access_level
    description: Visibility/access level of this data source.
    from_schema: https://w3id.org/ber-data/ber-data-registry
    slot_uri: ber_registry:access_level
    owner: DataSource
    domain_of:
    - DataSource
    range: AccessLevel
  keywords:
    name: keywords
    definition_uri: https://w3id.org/ber-data/ber-data-registry/keywords
    description: Discovery tags for this data source.
    from_schema: https://w3id.org/ber-data/ber-data-registry
    mappings:
    - dcat:keyword
    slot_uri: dcat:keyword
    owner: DataSource
    domain_of:
    - DataSource
    range: string
    multivalued: true
  project_affiliation:
    name: project_affiliation
    definition_uri: https://w3id.org/ber-data/ber-data-registry/project_affiliation
    description: BER program affiliations (e.g. KBase, NMDC, JGI, Phage Foundry).
    from_schema: https://w3id.org/ber-data/ber-data-registry
    slot_uri: ber_registry:project_affiliation
    owner: DataSource
    domain_of:
    - DataSource
    range: string
    multivalued: true
  license:
    name: license
    definition_uri: https://w3id.org/ber-data/ber-data-registry/license
    description: License governing use of this data source.
    from_schema: https://w3id.org/ber-data/ber-data-registry
    mappings:
    - dcterms:license
    slot_uri: dcterms:license
    owner: DataSource
    domain_of:
    - DataSource
    range: string
  domain:
    name: domain
    definition_uri: https://w3id.org/ber-data/ber-data-registry/domain
    description: Scientific domain(s) covered by this data source.
    from_schema: https://w3id.org/ber-data/ber-data-registry
    mappings:
    - dcat:theme
    slot_uri: dcat:theme
    owner: DataSource
    domain_of:
    - DataSource
    range: string
    multivalued: true
  version:
    name: version
    definition_uri: https://w3id.org/ber-data/ber-data-registry/version
    description: Version identifier for this data source.
    from_schema: https://w3id.org/ber-data/ber-data-registry
    mappings:
    - pav:version
    slot_uri: pav:version
    owner: DataSource
    domain_of:
    - DataSource
    range: string
  doi:
    name: doi
    definition_uri: https://w3id.org/ber-data/ber-data-registry/doi
    description: DOI if this data source has been published.
    from_schema: https://w3id.org/ber-data/ber-data-registry
    slot_uri: ber_registry:doi
    owner: DataSource
    domain_of:
    - DataSource
    range: string
  facility:
    name: facility
    definition_uri: https://w3id.org/ber-data/ber-data-registry/facility
    description: Originating facility (e.g. NERSC, JGI, EMSL) per HPDF report recommendations.
    from_schema: https://w3id.org/ber-data/ber-data-registry
    slot_uri: ber_registry:facility
    owner: DataSource
    domain_of:
    - DataSource
    range: string
  format:
